  assemblies:
  - PlumJsonAnimator
  namespace: PlumJsonAnimator.Services
  summary: Calculates interpolation parameter t from elapsed time
  example:
  - new Interpolation().findInterpolateParam(10, 6); //Returns 0.6
  syntax:
    content: public double findInterpolateParam(double segmentDuration, double timeElapsed)
    parameters:
    - id: segmentDuration
      type: System.Double
      description: Total duration in ms
    - id: timeElapsed
      type: System.Double
      description: Time passed in ms
    return:
      type: System.Double
      description: t value clamped between 0 and 1
